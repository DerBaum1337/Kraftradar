		<title>KraftRadar Administration</title>

	<body class="notranslate" translate="no">

		<!-- Decap injects its own stylesheet while loading. Load the KraftRadar
		     theme immediately afterwards so it wins without selector escalation. -->
		<link rel="stylesheet" href="/admin/admin.css?v=20260716-13" />
		<!-- Registers editorial defaults only; it never mounts a second CMS app. -->
		<script src="/admin/admin.js?v=20260716-8"></script>
